<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swag Labs</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login_container">
    <div class="login_logo">Swag Labs</div>

    <div class="login_wrapper">
      <form class="login-box" id="form-login" data-test="form-login" novalidate>
        <input type="text" class="form_input" id="campo-usuario" data-test="campo-usuario"
               placeholder="Username" autocomplete="username" autofocus>
        <input type="password" class="form_input" id="campo-senha" data-test="campo-senha"
               placeholder="Password" autocomplete="current-password">

        <div class="error-message-container" id="container-erro" data-test="container-erro">
          <span id="texto-erro" data-test="texto-erro"></span>
          <button type="button" class="error-button" id="botao-fechar-erro" data-test="botao-fechar-erro" aria-label="Fechar">&times;</button>
        </div>

        <input type="submit" class="btn btn_action" id="botao-entrar" data-test="botao-entrar" value="Login">
      </form>
    </div>

    <div class="login_credentials_wrap">
      <div class="login_credentials" id="credenciais-login" data-test="credenciais-login">
        <h4>Accepted usernames are:</h4>
        standard_user<br>
        locked_out_user<br>
        problem_user<br>
        performance_glitch_user<br>
        error_user<br>
        visual_user
      </div>
      <div class="login_password" id="senha-login" data-test="senha-login">
        <h4>Password for all users:</h4>
        secret_sauce
      </div>
    </div>
  </div>

  <script src="js/data.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/pages/login.js" defer></script>
</body>
</html>
